<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TokenYou — dev preview</title>
  <base href="/src/popup/">
  <link rel="stylesheet" href="/src/popup/popup.css">
  <style>
    html { background: #6b7680; }
    body {
      width: 360px !important;
      margin: 24px auto !important;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      border-radius: 12px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- El contenido del popup y su script se inyectan aquí en el mismo documento
       (sin iframe) para que las capturas de pantalla funcionen. Solo dev. -->
  <script>
    (async () => {
      // 1) Mock de las APIs de Chrome, evaluado antes que popup.js.
      const mock = await fetch('/dev/chrome-mock.js').then((r) => r.text());
      (0, eval)(mock);

      // 2) Cuerpo del popup real (sin su <script>, que cargamos aparte como módulo).
      const html = await fetch('/src/popup/popup.html').then((r) => r.text());
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const bodyNodes = [...doc.body.childNodes].filter(
        (n) => !(n.nodeName === 'SCRIPT')
      );
      document.body.append(...bodyNodes.map((n) => document.importNode(n, true)));

      // 3) popup.js como módulo: sus imports resuelven contra <base>.
      const s = document.createElement('script');
      s.type = 'module';
      s.src = '/src/popup/popup.js';
      document.body.append(s);
    })();
  </script>
</body>
</html>
