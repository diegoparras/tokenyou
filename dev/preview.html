<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TokenYou — dev preview</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: start center; background: #6b7680; padding: 32px; }
    iframe { width: 360px; height: 700px; border: none; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,.35); background: #fff; }
  </style>
</head>
<body>
  <iframe id="frame" title="popup"></iframe>
  <script>
    (async () => {
      const [html, mock] = await Promise.all([
        fetch('/src/popup/popup.html').then((r) => r.text()),
        fetch('/dev/chrome-mock.js').then((r) => r.text()),
      ]);
      // replace() con función para que los "$$" del mock no se interpreten
      // como secuencias especiales del string de reemplazo.
      const injected = html.replace(
        '<head>',
        () => `<head><base href="${location.origin}/src/popup/"><` + `script>${mock}<` + '/script>'
      );
      document.getElementById('frame').srcdoc = injected;
    })();
  </script>
</body>
</html>
