name: CI

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck

  reproducible-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack with git archive (byte-reproducible from the commit)
        run: |
          mkdir -p dist
          git archive --format=zip -o dist/tokenyou.zip HEAD manifest.json src icons _locales LICENSE
          sha256sum dist/tokenyou.zip | tee dist/tokenyou.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: tokenyou-zip
          path: dist/
