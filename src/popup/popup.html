<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="brand">
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="7" width="17" height="10" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <rect x="5" y="10" width="7" height="4" rx="1" fill="currentColor"/>
        <rect x="20.5" y="10" width="2.5" height="4" rx="1" fill="currentColor"/>
      </svg>
      <h1>TokenYou</h1>
    </div>
    <div class="head-right">
      <span id="updated" class="updated"></span>
      <svg id="overall" class="overall" viewBox="0 0 36 36" hidden>
        <circle class="ring-track" cx="18" cy="18" r="15" fill="none" stroke-width="5"/>
        <circle id="overall-arc" class="ring-fill" cx="18" cy="18" r="15" fill="none" stroke-width="5"
                stroke-linecap="round" transform="rotate(-90 18 18)"/>
        <text id="overall-text" x="18" y="21.5" text-anchor="middle"></text>
      </svg>
      <button id="history" class="icon-btn" title="">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 20V4M4 20h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 16v-4M13 16v-8M18 16v-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="refresh" class="icon-btn" title="">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 12a8 8 0 1 1-2.34-5.66" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 3v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="cards"></main>

  <section id="empty" hidden>
    <h2 id="empty-title"></h2>
    <p id="empty-body"></p>
  </section>

  <section id="add" hidden>
    <h2 id="add-title"></h2>
    <p id="add-hint"></p>
    <div id="add-list"></div>
    <a id="custom-link" href="#" class="custom-link"></a>
  </section>

  <footer>
    <span id="footer-note"></span>
    <a href="https://github.com/diegoparras/tokenyou" target="_blank" rel="noreferrer">GitHub</a>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
