<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="brand">
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="7" width="17" height="10" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <rect x="5" y="10" width="7" height="4" rx="1" fill="currentColor"/>
        <rect x="20.5" y="10" width="2.5" height="4" rx="1" fill="currentColor"/>
      </svg>
      <h1>TokenYou</h1>
    </div>
    <div id="ring-group" class="ring-group"></div>
    <span class="head-sp"></span>
    <div class="head-btns">
      <button id="history" class="icon-btn" title="">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="m19 9-5 5-4-4-3 3"/>
        </svg>
      </button>
      <button id="refresh" class="icon-btn" title="">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="cards"></main>

  <section id="empty" hidden>
    <h2 id="empty-title"></h2>
    <p id="empty-body"></p>
  </section>

  <section id="add" hidden>
    <h2 id="add-title"></h2>
    <p id="add-hint"></p>
    <div id="add-list"></div>
    <a id="custom-link" href="#" class="custom-link"></a>
  </section>

  <footer>
    <span id="footer-note"></span>
    <a href="https://github.com/diegoparras/tokenyou" target="_blank" rel="noreferrer">GitHub</a>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
