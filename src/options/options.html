<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <header>
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="7" width="17" height="10" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <rect x="5" y="10" width="7" height="4" rx="1" fill="currentColor"/>
        <rect x="20.5" y="10" width="2.5" height="4" rx="1" fill="currentColor"/>
      </svg>
      <h1 id="title"></h1>
    </header>

    <section class="notif" id="notif">
      <h2 id="notif-title"></h2>
      <p id="notif-intro" class="intro"></p>
      <label class="row"><span id="notif-enable-lbl"></span>
        <input type="checkbox" id="notif-enable"></label>
      <div id="notif-opts" class="notif-opts">
        <label class="row sub"><span id="notif-reset-lbl"></span><input type="checkbox" id="notif-reset"></label>
        <label class="row sub"><span id="notif-th-lbl"></span><input type="checkbox" id="notif-th"></label>
      </div>
    </section>

    <section class="notif" id="prefs-sec">
      <h2 id="prefs-title"></h2>
      <label class="row"><span id="badge-lbl"></span>
        <select id="badge-select" class="mini-sel"></select></label>
      <div class="notif-opts" style="border-top:1px solid var(--line);margin-top:6px;padding-top:8px">
        <p id="refresh-intro" class="intro" style="margin:2px 0 6px"></p>
        <div id="refresh-list"></div>
      </div>
    </section>

    <h2 id="custom-title" class="section-h"></h2>
    <p id="intro" class="intro"></p>
    <div class="security-note" id="security-note"></div>

    <div class="toolbar">
      <button id="template-btn" class="btn ghost"></button>
      <span class="spacer"></span>
      <button id="test-btn" class="btn ghost"></button>
      <button id="save-btn" class="btn primary"></button>
    </div>

    <textarea id="editor" spellcheck="false"></textarea>

    <pre id="result" hidden></pre>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
